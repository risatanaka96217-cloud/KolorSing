<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex">
  <title>ColorSing ライバー売上ダッシュボード</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: sans-serif; padding: 20px; background: #f0f2f5; margin: 0; }
    h1 { margin-bottom: 14px; color: #1a1a2e; }

    .card { background: #fff; padding: 16px; border-radius: 12px; margin-top: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }

    /* ファイル読み込み */
    .file-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 6px 0; }
    .app-badge { font-size: 12px; font-weight: bold; width: 90px; flex-shrink: 0; }
    .app-badge.cs { color: #e91e8c; }
    .file-btn { color: #fff; border: none; border-radius: 6px; padding: 6px 13px; font-size: 13px; cursor: pointer; white-space: nowrap; }
    .file-btn.cs { background: #e91e8c; }
    .file-btn.cs:hover { background: #c01070; }
    .file-name { font-size: 12px; color: #999; }

    /* 読み込み済み月チップ */
    #months { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .chip { background: #fce4ec; color: #e91e8c; border-radius: 20px; padding: 4px 10px 4px 14px; font-size: 13px; cursor: pointer; border: 2px solid transparent; display: inline-flex; align-items: center; gap: 5px; user-select: none; }
    .chip.on { border-color: #e91e8c; font-weight: bold; }
    .chip .x { color: #bbb; font-size: 11px; cursor: pointer; }
    .chip .x:hover { color: #c00; }

    /* タブ */
    .tabs { display: flex; gap: 0; margin-top: 14px; border-bottom: 2px solid #e0e0e0; }
    .tabBtn { padding: 9px 22px; cursor: pointer; font-size: 14px; color: #888; border: none; background: none; border-bottom: 3px solid transparent; margin-bottom: -2px; font-weight: 500; }
    .tabBtn.on { color: #e91e8c; border-bottom-color: #e91e8c; font-weight: bold; }
    .tabBtn:hover:not(.on) { color: #333; }

    /* ランキンググリッド */
    #rankArea { display: none; margin-top: 12px; }
    .rank-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 12px; }
    .view { display: none; }
    .view.on { display: block; }

    .rank-col { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .rank-col h3 { margin: 0 0 12px; font-size: 15px; }
    .rank-col h3.cs { color: #e91e8c; }

    .rrow { display: flex; padding: 8px 4px; border-bottom: 1px solid #f0f0f0; align-items: flex-start; gap: 6px; }
    .rrow:last-child { border-bottom: none; }
    .rnum { font-size: 16px; font-weight: bold; color: #ddd; width: 24px; flex-shrink: 0; }
    .rnum.g { color: #f4a100; }
    .rnum.s { color: #9e9e9e; }
    .rnum.b { color: #a1674a; }
    .rwrap { flex: 1; min-width: 0; }
    .rname { font-weight: bold; color: #1a1a2e; cursor: pointer; }
    .rname:hover { color: #e91e8c; text-decoration: underline; }
    .rraw  { font-size: 11px; color: #ccc; }
    .cands { margin-top: 4px; display: flex; flex-wrap: wrap; gap: 3px; }
    .cands button { background: #f0f0f0; border: none; border-radius: 4px; padding: 2px 7px; font-size: 11px; cursor: pointer; }
    .cands button:hover { background: #ddd; }
    .rsales { font-weight: bold; font-size: 14px; white-space: nowrap; }

    /* モーダル */
    #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; align-items: center; justify-content: center; }
    #modal.open { display: flex; }
    #mbox { background: #fff; border-radius: 16px; padding: 24px; width: min(740px, 95vw); max-height: 88vh; overflow-y: auto; position: relative; }
    #mtitle { font-size: 18px; font-weight: bold; margin-bottom: 16px; padding-right: 30px; }
    #mclose { position: absolute; top: 16px; right: 20px; cursor: pointer; font-size: 22px; color: #bbb; }
    #mclose:hover { color: #333; }
    #mcharts { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
    .mc-section h4 { margin: 0 0 8px; font-size: 14px; }
    .mc-section h4.cs { color: #e91e8c; }
  </style>
</head>
<body>

<h1>ColorSing ライバー売上管理</h1>

<div class="card">
  <div class="file-row">
    <span class="app-badge cs">アプリ別明細</span>
    <input type="file" id="fcs" accept=".xlsx,.xls" style="display:none">
    <button class="file-btn cs" onclick="document.getElementById('fcs').click()">📂 ファイル選択</button>
    <span class="file-name" id="fncs"></span>
  </div>
  <div id="months"></div>
  <div style="margin-top:10px;">
    <button onclick="saveDataJson()" style="background:#2e7d32;color:#fff;border:none;border-radius:6px;padding:7px 16px;font-size:13px;cursor:pointer;">🔄 サイトを更新（data.json保存）</button>
    <button onclick="exportStandalone()" style="background:#f57c00;color:#fff;border:none;border-radius:6px;padding:7px 16px;font-size:13px;cursor:pointer;margin-left:6px;">📤 共有用HTMLを書き出す</button>
  </div>
</div>

<div id="rankArea">
  <div class="tabs">
    <button class="tabBtn on" onclick="switchTab('monthly')">📅 月別</button>
    <button class="tabBtn"    onclick="switchTab('yearly')">📊 年別合計</button>
  </div>
  <div id="view-monthly" class="view on">
    <div class="rank-grid" id="grid"></div>
  </div>
  <div id="view-yearly" class="view">
    <div class="rank-grid" id="ygrid"></div>
  </div>
</div>

<!-- ライバー詳細モーダル -->
<div id="modal">
  <div id="mbox">
    <span id="mclose" onclick="closeModal()">✕</span>
    <div id="mtitle"></div>
    <div id="mcharts"></div>
  </div>
</div>

<script>
// ===== 共有用データプレースホルダー（書き出し時に置換）=====
const BAKED_DATA = null; // BAKED_DATA_PLACEHOLDER

// ===== State =====
let csData = {};   // "202601" → { month:"2026年1月", livers:[] }
let activeKey = null;
let wbCs = null;
let mCharts = [];

// ===== 初期化 =====
(async function init() {
  try {
    if (BAKED_DATA) {
      csData = BAKED_DATA.cs || {};
    } else {
      let loaded = false;
      try {
        const res = await fetch('./data.json');
        if (res.ok) {
          const json = await res.json();
          if (json.cs) {
            csData = json.cs || {};
            loaded = true;
          }
        }
      } catch(e) {}
      if (!loaded) {
        const c = localStorage.getItem('cs_v2'); if (c) csData = JSON.parse(c);
        if (typeof csData !== 'object') csData = {};
      }
    }
  } catch(e) { csData = {}; }
  const keys = allKeys();
  if (keys.length) {
    activeKey = keys[0];
    show(); renderChips();
    try { renderRanking(); } catch(e) { console.error('init render error:', e); }
  }
})();

function persist() {
  try {
    localStorage.setItem('cs_v2', JSON.stringify(csData));
  } catch(e) { console.warn('localStorage full:', e); }
}

// ===== シート名パーサー =====
// YYYYMM / YYYY0M / YYMM すべて "YYYYMM" キーに正規化
function parseSheet(name) {
  let m;
  m = name.match(/^(\d{4})0*(\d+)$/);
  if (m) {
    const y = +m[1], mo = +m[2];
    if (y >= 2000 && mo >= 1 && mo <= 12)
      return { year: y, month: mo, label: `${y}年${mo}月`, key: `${y}${String(mo).padStart(2,'0')}` };
  }
  m = name.match(/^(\d{2})(\d{2})$/);
  if (m) {
    const y = 2000 + +m[1], mo = +m[2];
    if (mo >= 1 && mo <= 12)
      return { year: y, month: mo, label: `${y}年${mo}月`, key: `${y}${String(mo).padStart(2,'0')}` };
  }
  return null;
}

function numKey(k) { return parseInt(k, 10); }

function allKeys() {
  return Object.keys(csData).sort((a, b) => numKey(b) - numKey(a));
}

// ===== アプリ別明細 (ColorSing) =====
document.getElementById("fcs").addEventListener("change", function(e) {
  const file = e.target.files[0]; if (!file) return;
  document.getElementById("fncs").textContent = "読み込み中…";
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      wbCs = XLSX.read(ev.target.result, { type: "array" });
      const sheets = wbCs.SheetNames.filter(n => { const p = parseSheet(n); return p && p.year >= 2025; });
      if (sheets.length === 0) { alert("対応するシートが見つかりませんでした"); return; }
      sheets.forEach(n => loadCs(n));
      const totalCs = sheets.reduce((s, n) => {
        const p = parseSheet(n); return s + (p && csData[p.key]?.livers?.length || 0);
      }, 0);
      document.getElementById("fncs").textContent = `${file.name}（${sheets.length}ヶ月・${totalCs}件）`;
    } catch(err) { alert("ファイルの読み込みエラー: " + err.message); }
  };
  reader.onerror = () => alert("ファイルの読み取りに失敗しました");
  reader.readAsArrayBuffer(file);
});

function loadCs(sheetName) {
  try {
    const ws = wbCs?.Sheets[sheetName]; if (!ws) return;
    const p = parseSheet(sheetName); if (!p) return;

    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });

    // ColorSing セクションをすべて探す（"ColorSing" と "ColorSing②" など）
    // 構造: タイトル行(col A に "ColorSing") → 列ヘッダー行 → データ行
    // データ列: 本名(0), ライバー名(1), -(2), 合計（税込）(3)
    const salesMap = {}; // real_name → { raw_name, sales }

    let i = 0;
    while (i < rows.length) {
      const cell = rows[i][0];
      if (cell && String(cell).includes('ColorSing')) {
        // タイトル行を発見、次の行がヘッダー、その次からデータ
        i += 2; // ヘッダー行をスキップ
        while (i < rows.length) {
          const row = rows[i];
          const rn = row[0];
          // 空行または次のセクションヘッダーに当たったら終了
          if (!rn) { i++; break; }
          const cellStr = String(rn);
          // 次のセクション（ColorSingや他アプリ）のタイトル行に当たったら終了
          if (cellStr.includes('ColorSing') || cellStr.includes('TikTok') || cellStr.includes('Pococha')) break;

          const sales = row[3];
          const salesNum = typeof sales === 'number' ? sales : parseFloat(sales);
          if (isFinite(salesNum) && salesNum > 0) {
            const ln = row[1];
            const key = cellStr;
            if (!salesMap[key]) {
              salesMap[key] = {
                real_name: cellStr,
                raw_name: ln ? String(ln) : cellStr,
                sales: 0
              };
            }
            salesMap[key].sales += Math.round(salesNum);
          }
          i++;
        }
      } else {
        i++;
      }
    }

    const livers = Object.values(salesMap).filter(l => l.sales > 0);
    if (livers.length === 0) { console.warn('ColorSing data not found in', sheetName); return; }

    // 表示名を維持
    livers.forEach(l => {
      const prev = csData[p.key]?.livers?.find(x => x.real_name === l.real_name);
      l.candidates = [{ name: l.real_name }];
      l.selected = prev?.selected || l.real_name;
    });

    csData[p.key] = { month: p.label, livers };
    onLoaded(p.key);
  } catch(e) { console.error('loadCs error:', sheetName, e); }
}

// ===== データ読み込み後 =====
function onLoaded(key) {
  try {
    if (!activeKey || numKey(key) > numKey(activeKey)) activeKey = key;
    show(); renderChips(); renderRanking(); persist();
  } catch(e) { console.error('onLoaded error:', e); alert('表示エラー: ' + e.message); }
}

function show() { document.getElementById("rankArea").style.display = "block"; }

// ===== 月チップ =====
function renderChips() {
  document.getElementById("months").innerHTML = allKeys().map(key => {
    const label = csData[key]?.month || key;
    return `<div class="chip ${key===activeKey?'on':''}" onclick="switchMonth('${key}')">
      ${label}<span class="x" onclick="removeMonth(event,'${key}')">✕</span></div>`;
  }).join("");
}

let activeTab = 'monthly';

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tabBtn').forEach((btn, i) => {
    btn.classList.toggle('on', (tab === 'monthly' && i === 0) || (tab === 'yearly' && i === 1));
  });
  document.getElementById('view-monthly').classList.toggle('on', tab === 'monthly');
  document.getElementById('view-yearly').classList.toggle('on', tab === 'yearly');
  if (tab === 'yearly') renderYearly();
}

function switchMonth(key) { activeKey = key; renderChips(); renderRanking(); }

function removeMonth(e, key) {
  e.stopPropagation();
  delete csData[key];
  activeKey = allKeys()[0] || null;
  renderChips(); renderRanking(); persist();
}

// ===== ランキング =====
function renderRanking() {
  const grid = document.getElementById("grid");
  if (!activeKey) { grid.innerHTML = ""; return; }

  const cd = csData[activeKey];
  if (!cd) { grid.innerHTML = ""; return; }

  grid.innerHTML = rankColHTML(cd.livers, `ColorSing ${cd.month}`, activeKey);
}

function rankColHTML(livers, title, mk) {
  const sorted = [...livers].sort((a, b) => b.sales - a.sales);
  const nc = i => i===0?'g':i===1?'s':i===2?'b':'';
  const rows = sorted.map((l, i) => {
    const er = encodeURIComponent(l.real_name);
    return `
      <div class="rrow">
        <span class="rnum ${nc(i)}">${i+1}</span>
        <div class="rwrap">
          <div class="rname" onclick="openModal('${encodeURIComponent(l.real_name)}')">${escH(l.selected||l.real_name)}</div>
          <div class="rraw">${escH(l.raw_name)}</div>
          <div class="cands">
            ${(l.candidates||[]).map(c=>`<button onclick="sel('${mk}','${er}','${encodeURIComponent(c.name)}')">${escH(c.name)}</button>`).join("")}
            <button onclick="sel('${mk}','${er}','__NEW__')">＋新規</button>
          </div>
        </div>
        <div class="rsales">¥${l.sales.toLocaleString()}</div>
      </div>`;
  }).join("");
  return `<div class="rank-col"><h3 class="cs">${escH(title)}</h3>${rows}</div>`;
}

// ===== 年別ランキング =====
function renderYearly() {
  const ygrid = document.getElementById("ygrid");

  const years = [...new Set(
    Object.keys(csData).map(k => parseSheet(k)?.year).filter(Boolean)
  )].sort((a, b) => b - a);

  let html = '';
  for (const year of years) {
    const keys = Object.keys(csData).filter(k => parseSheet(k)?.year === year);
    if (keys.length === 0) continue;

    const totals = {};
    for (const k of keys) {
      for (const l of (csData[k].livers || [])) {
        const id = l.real_name;
        if (!totals[id]) totals[id] = { real_name: id, selected: l.selected || l.real_name, sales: 0 };
        totals[id].selected = l.selected || l.real_name;
        totals[id].sales += l.sales;
      }
    }

    const sorted = Object.values(totals).sort((a, b) => b.sales - a.sales);
    if (sorted.length === 0) continue;

    const nc = i => i===0?'g':i===1?'s':i===2?'b':'';
    const rows = sorted.map((l, i) => `
      <div class="rrow">
        <span class="rnum ${nc(i)}">${i+1}</span>
        <div class="rwrap">
          <div class="rname" onclick="openModal('${encodeURIComponent(l.real_name)}')">${escH(l.selected)}</div>
        </div>
        <div class="rsales">¥${l.sales.toLocaleString()}</div>
      </div>`).join('');

    html += `<div class="rank-col"><h3 class="cs">${year}年 ColorSing ランキング</h3>${rows}</div>`;
  }

  ygrid.innerHTML = html || '<p style="color:#aaa;padding:16px;">データがありません</p>';
}

function sel(mk, realEnc, nameEnc) {
  const realName = decodeURIComponent(realEnc);
  const l = csData[mk]?.livers.find(x => x.real_name === realName);
  if (!l) return;
  if (nameEnc === "__NEW__") { const v = prompt("新しい名前を入力"); if (v) l.selected = v; }
  else l.selected = decodeURIComponent(nameEnc);
  renderRanking(); persist();
}

// ===== モーダル（ライバー月別グラフ） =====
function openModal(enc) {
  const realName = decodeURIComponent(enc);
  mCharts.forEach(c => c.destroy()); mCharts = [];

  let displayName = realName;
  const k = Object.keys(csData).sort((a,b)=>numKey(b)-numKey(a))
    .find(k => csData[k].livers.find(l => l.real_name === realName));
  if (k) { const l = csData[k].livers.find(l => l.real_name === realName);
    if (l) displayName = l.selected || realName; }
  document.getElementById("mtitle").textContent = displayName;

  const monthly = {};
  for (const key of Object.keys(csData)) {
    const l = csData[key].livers.find(x => x.real_name === realName);
    if (l) monthly[key] = l.sales;
  }

  const div = document.getElementById("mcharts");
  div.innerHTML = "";

  if (!Object.keys(monthly).length) return;

  const cid = 'mc_cs';
  const sec = document.createElement("div");
  sec.className = "mc-section";
  sec.innerHTML = `<h4 class="cs">ColorSing</h4><canvas id="${cid}"></canvas>`;
  div.appendChild(sec);

  const sortedK = Object.keys(monthly).sort((a,b)=>numKey(a)-numKey(b));
  setTimeout(() => {
    const c = new Chart(document.getElementById(cid), {
      type: 'bar',
      data: {
        labels: sortedK.map(k => { const p=parseSheet(k); return p?p.label:k; }),
        datasets: [{ data: sortedK.map(k=>monthly[k]),
          backgroundColor: 'rgba(233,30,140,.7)', borderColor: 'rgba(233,30,140,1)', borderWidth: 1 }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true, ticks: { callback: v => v.toLocaleString() } },
          x: { ticks: { maxRotation: 45, minRotation: 30 } }
        }
      }
    });
    mCharts.push(c);
  }, 0);

  document.getElementById("modal").classList.add("open");
}

function closeModal() { document.getElementById("modal").classList.remove("open"); }
document.getElementById("modal").addEventListener("click", e => {
  if (e.target === document.getElementById("modal")) closeModal();
});

// ===== data.json 保存（Vercel更新用）=====
function saveDataJson() {
  const json = JSON.stringify({ cs: csData }, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'data.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ===== 共有用HTML書き出し =====
function exportStandalone() {
  const src = document.documentElement.outerHTML;
  const dataStr = JSON.stringify({ cs: csData });
  const out = src.replace(
    'const BAKED_DATA = null; // BAKED_DATA_PLACEHOLDER',
    `const BAKED_DATA = ${dataStr}; // BAKED_DATA_PLACEHOLDER`
  );
  if (out === src) {
    alert('書き出し失敗：プレースホルダーが見つかりませんでした');
    return;
  }
  const blob = new Blob([out], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `ColorSing売上_${new Date().toISOString().slice(0,10)}.html`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function escH(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
</script>
</body>
</html>
